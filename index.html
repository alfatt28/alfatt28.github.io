<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alfatt28 Premium Space</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
header{padding:20px;text-align:center;background:#111827;position:sticky;top:0}
.card{background:#1e293b;margin:15px;padding:15px;border-radius:15px}
button{padding:10px 15px;border:none;border-radius:10px;cursor:pointer}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:10px}
.gallery img{max-width:100%;border-radius:10px;margin-top:10px}
marquee{background:#2563eb;padding:10px}
.light{background:#f1f5f9;color:#111}
.light .card{background:#fff;color:#111}
.progress{background:#334155;border-radius:10px;overflow:hidden}
.bar{height:20px;background:#22c55e;width:85%}
</style>
</head>
<body>

<marquee>🔥 Selamat datang di alfatt28.github.io | Tetap belajar | Tetap bertarung 🚀</marquee>

<header>
<h1>ALFATT28 PREMIUM WEBSITE</h1>
<div id="clock"></div>
<button onclick="toggleMode()">Dark / Light</button>
</header>

<div class="card">
<h2>Profil</h2>
<input type="file" id="avatarUpload">
<img id="avatar" style="max-width:120px;border-radius:50%;display:block;margin-top:10px;">
</div>

<div class="card">
<h2>Sosial Media</h2>
<p><a href="https://instagram.com" target="_blank">Instagram</a></p>
<p><a href="https://facebook.com" target="_blank">Facebook</a></p>
<p><a href="https://wa.me/" target="_blank">WhatsApp</a></p>
<p><a href="https://github.com" target="_blank">GitHub</a></p>
</div>

<div class="card">
<h2>Galeri</h2>
<input type="file" id="galleryUpload">
<div class="gallery" id="gallery"></div>
</div>

<div class="card">
<h2>Timeline</h2>
<textarea id="status" placeholder="Tulis status..."></textarea>
<button onclick="postStatus()">Posting</button>
<div id="timeline"></div>
</div>

<div class="card">
<h2>Catatan</h2>
<textarea id="notes"></textarea>
</div>

<div class="card">
<h2>Kalkulator</h2>
<input id="calc" placeholder="12+8">
<button onclick="calc()">Hitung</button>
<h3 id="result"></h3>
</div>

<div class="card">
<h2>Skill Progress</h2>
HTML
<div class="progress"><div class="bar"></div></div>
</div>

<div class="card">
<h2>Kutipan</h2>
<p id="quote"></p>
<button onclick="newQuote()">Kutipan Baru</button>
</div>

<script>
setInterval(()=>{
document.getElementById('clock').innerHTML=new Date().toLocaleString('id-ID');
},1000);

function toggleMode(){
document.body.classList.toggle('light');
}

document.getElementById('avatarUpload').onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();
r.onload=()=>{
localStorage.avatar=r.result;
document.getElementById('avatar').src=r.result;
};
r.readAsDataURL(f);
};
if(localStorage.avatar)document.getElementById('avatar').src=localStorage.avatar;

document.getElementById('galleryUpload').onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();
r.onload=()=>{
let img=document.createElement('img');
img.src=r.result;
document.getElementById('gallery').appendChild(img);
};
r.readAsDataURL(f);
};

function postStatus(){
let txt=document.getElementById('status').value;
let div=document.createElement('div');
div.className='card';
div.innerHTML=txt;
document.getElementById('timeline').prepend(div);
}

document.getElementById('notes').value=localStorage.notes||'';
document.getElementById('notes').oninput=()=>{
localStorage.notes=document.getElementById('notes').value;
};

function calc(){
try{
document.getElementById('result').innerHTML=eval(document.getElementById('calc').value);
}catch{
document.getElementById('result').innerHTML='Error';
}
}

const quotes=[
"Jangan menyerah.",
"Tetap belajar.",
"Kesuksesan dimulai dari langkah kecil.",
"Fokus pada tujuan."
];
function newQuote(){
document.getElementById('quote').innerHTML=quotes[Math.floor(Math.random()*quotes.length)];
}
newQuote();
</script>
</body>
</html>
