<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO untuk mesin pencari -->
    <title>Atthar - Personal Website</title>
    <meta name="description" content="Website personal Atthar - terhubung dengan saya melalui media sosial">
    <meta name="keywords" content="Atthar, personal, website, sosial media">
    <meta name="author" content="Atthar">
    
    <!-- Open Graph untuk tampilan bagus di Google -->
    <meta property="og:title" content="Atthar - Personal Website">
    <meta property="og:description" content="Website personal Atthar">
    <meta property="og:type" content="website">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 30px rgba(245,87,108,0.4);
        }

        /* KOSONGKAN NAMA - bisa diisi sendiri */
        .name {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Ganti tulisan di bawah nama */
        .subtitle {
            font-size: 1em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            margin: 0 auto 30px;
            border-radius: 10px;
        }

        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
        }

        .social-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .social-btn .icon {
            font-size: 1.8em;
            width: 40px;
            text-align: center;
        }

        /* Warna masing-masing saat hover */
        .btn-instagram:hover {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-color: #f5576c;
        }

        .btn-facebook:hover {
            background: #1877f2;
            border-color: #1877f2;
        }

        .btn-whatsapp:hover {
            background: #25d366;
            border-color: #25d366;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: rgba(255,255,255,0.3);
        }

        /* Efek partikel kecil */
        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }

        .glow-1 {
            top: -100px;
            right: -100px;
            background: #f5576c;
            opacity: 0.3;
        }

        .glow-2 {
            bottom: -100px;
            left: -100px;
            background: #4facfe;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <!-- Efek background -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <!-- Avatar -->
        <div class="avatar">A</div>

        <!-- KOSONGKAN NAMA - Ganti "Atthar" dengan nama kamu -->
        <h1 class="name">Atthar</h1>
        <p class="subtitle">✦ Personal Website ✦</p>

        <div class="divider"></div>

        <!-- Link Sosial Media -->
        <div class="social-grid">
            
            <!-- INSTAGRAM -->
            <a href="https://instagram.com/atthar" target="_blank" class="social-btn btn-instagram">
                <span class="icon">📸</span>
                <span>Instagram</span>
            </a>

            <!-- FACEBOOK -->
            <a href="https://facebook.com/atthar" target="_blank" class="social-btn btn-facebook">
                <span class="icon">👍</span>
                <span>Facebook</span>
            </a>

            <!-- WHATSAPP (link chat) -->
            <a href="https://wa.me/6281234567890" target="_blank" class="social-btn btn-whatsapp">
                <span class="icon">💬</span>
                <span>WhatsApp</span>
            </a>

        </div>

        <p class="footer">© 2026 • Terhubung dengan saya</p>
    </div>

</body>
</html>
